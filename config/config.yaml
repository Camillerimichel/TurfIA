# Configuration applicative non sensible (cf. L026 §3.2).
# Les secrets (identifiants, clés) ne sont jamais placés ici : cf. .env / variables d'environnement.

api:
  prefix: /api/v1
  pagination:
    default_size: 50
    max_size: 500

logging:
  format: json
  # Niveau minimal des évènements écrits dans la table `journal` (cf. L022,
  # module Administration L018 §10) — INFO/DEBUG restent stdout-only.
  niveau_db: WARNING

securite:
  # Durée de validité d'une session (cf. L021 §3.3) — au-delà, le jeton est
  # refusé même s'il n'a pas été explicitement révoqué.
  session_duree_minutes: 60
  login:
    # Limitation de débit sur POST /auth/login (cf. L021 §7.2.1).
    max_tentatives: 5
    fenetre_secondes: 300

administration:
  # Répertoire des sauvegardes pg_dump (cf. L018 §10, scripts/sauvegarder_base.py).
  chemin_sauvegardes: data/sauvegardes

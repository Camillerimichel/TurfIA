<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TurfIA — Fiche course</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="entete">
    <h1><a href="/">TurfIA</a></h1>
    <nav>
      <a href="/">Accueil</a>
      <a href="/historique.html">Historique</a>
      <a href="/statistiques.html">Statistiques</a>
      <a href="/administration.html">Administration</a>
    </nav>
    <div class="info-utilisateur">
      <span id="nom-utilisateur"></span>
      <button id="bouton-deconnexion">Déconnexion</button>
    </div>
  </header>

  <main>
    <section class="carte">
      <h2 id="titre-course">Chargement…</h2>
      <div id="infos-course"></div>
    </section>

    <section class="carte">
      <h2>Partants</h2>
      <div class="tableau-scroll">
        <table id="tableau-partants">
          <thead>
            <tr>
              <th>N°</th><th>Cheval</th><th>Jockey</th><th>Entraîneur</th><th>Cote</th><th>Non-partant</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="carte">
      <h2>Résultat</h2>
      <button type="button" id="bouton-collecter-resultats">Récupérer les résultats</button>
      <p id="message-resultats" hidden></p>
      <div class="tableau-scroll" id="conteneur-tableau-resultats" hidden>
        <table id="tableau-resultats">
          <thead><tr><th>Classement</th><th>N°</th><th>Temps</th><th>Écart</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="carte">
      <h2>Déclencher une analyse</h2>
      <form id="formulaire-analyse">
        <label for="mise-reference">Mise de référence (€)</label>
        <input type="number" id="mise-reference" value="10" min="0" step="0.5" />

        <label for="budget-precedent">Budget précédent (€)</label>
        <input type="number" id="budget-precedent" value="0" min="0" step="0.5" />

        <label>
          <input type="checkbox" id="perte-precedente" />
          Perte lors de la précédente analyse (garde-fou anti-martingale)
        </label>

        <button type="submit">Lancer l'analyse automatique</button>
        <p id="message-analyse" hidden></p>
      </form>
    </section>

    <section class="carte">
      <h2>Analyses</h2>
      <div id="liste-analyses">Chargement…</div>
      <div id="detail-analyse"></div>
    </section>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/course.js"></script>
</body>
</html>

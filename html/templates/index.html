<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TurfIA — Accueil</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="entete">
    <h1><a href="/">TurfIA</a></h1>
    <nav>
      <a href="/" class="actif">Accueil</a>
      <a href="/historique.html">Historique</a>
      <a href="/statistiques.html">Statistiques</a>
      <a href="/administration.html">Administration</a>
    </nav>
    <div class="info-utilisateur">
      <span id="nom-utilisateur"></span>
      <button id="bouton-deconnexion">Déconnexion</button>
    </div>
  </header>

  <main>
    <section class="carte carte-sticky">
      <h2>ROI global</h2>
      <div id="widget-roi-global">Chargement…</div>
      <div class="actions-automatisation">
        <button id="bouton-collecte-accueil" type="button">Collecter le programme du jour</button>
        <button id="bouton-analyse-jour-accueil" type="button">Analyser les courses du jour</button>
        <button id="bouton-statistiques-accueil" type="button">Calculer les statistiques</button>
      </div>
      <div id="message-automatisation-accueil" hidden></div>
    </section>

    <details class="carte" open>
      <summary><h2>Paris en cours à surveiller</h2></summary>
      <div id="widget-paris-en-cours">Chargement…</div>
    </details>

    <details class="carte">
      <summary><h2>Réunions et paris du jour</h2></summary>
      <form id="formulaire-filtres-accueil">
        <label for="selecteur-date">Date</label>
        <input type="date" id="selecteur-date" />

        <label for="filtre-hippodrome-accueil">Hippodrome</label>
        <select id="filtre-hippodrome-accueil">
          <option value="">Tous</option>
        </select>

        <fieldset id="filtre-decision-accueil">
          <legend>Décision</legend>
          <label><input type="checkbox" value="Ne pas jouer" /> Ne pas jouer</label>
          <label><input type="checkbox" value="Jeu prudent" checked /> Jeu prudent</label>
          <label><input type="checkbox" value="Jeu normal" checked /> Jeu normal</label>
          <label><input type="checkbox" value="Forte opportunité" checked /> Forte opportunité</label>
        </fieldset>
      </form>
      <button type="button" id="bouton-courses-imminentes">Courses à jouer dans l'heure</button>
      <div id="liste-reunions">Chargement…</div>
    </details>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/accueil.js"></script>
</body>
</html>
